<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=3.0, viewport-fit=cover"/>
    <meta name="theme-color" content="#020617" />
    <title>Neurodivergent Employment Resource</title>

    <style>
        /* --- Core Layout Design Tokens --- */
        :root {
            --bg: #0f172a;
            --container-bg: #020617;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --panel-bg: #1e293b;
            --dropdown-bg: #111827;
        }

        /* Prevent the page from scrolling left-to-right */
        html, body {
            overflow-x: hidden;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container { 
            max-width: 600px; 
            margin: auto; 
            background: var(--container-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            z-index: 10;
        }

        .main-title {
            font-size: 1.5rem;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            display: inline-block;
            margin-bottom: 20px;
        }

        /* --- Dynamic Collapsible Lists --- */
        .resource-group {
            margin-bottom: 15px;
            border-radius: 6px;
        }

        .resource-header {
            display: block;
            font-weight: 700;
            padding: 14px 16px;
            background: var(--panel-bg);
            cursor: pointer;
            user-select: none;
            transition: background 0.2s ease;
        }

        .resource-header:hover {
            background: #25334d;
        }

        .dropdown-content {
            padding: 10px 16px;
            background: var(--dropdown-bg);
            border-top: 1px solid #1e293b;
        }

        /* --- Link Elements --- */
        .sub-link {
            display: block;
            text-decoration: none;
            color: var(--text);
            padding: 12px 0;
            border-bottom: 1px solid #1e293b;
            transition: transform 0.15s ease;
        }

        .sub-link:last-of-type {
            border-bottom: none;
        }

        .sub-link strong {
            font-size: 1rem;
            line-height: 1.3;
        }

        .link-text {
            color: var(--text-muted);
            font-size: 0.85rem;
            display: inline-block;
            margin-top: 4px;
        }

        /* --- Custom Info-Tip & Hover Tip-Box Engine --- */
        .info-tip {
            position: relative; 
            display: inline-flex; 
            align-items: center;
            justify-content: center; 
            background: #334155; 
            color: var(--text-muted);
            border-radius: 50%; 
            width: 18px; 
            height: 18px; 
            font-size: 11px;
            font-weight: bold; 
            cursor: help; 
            margin-left: 6px; 
            user-select: none;
            outline: none; 
            transition: background 0.2s, color 0.2s;
            flex-shrink: 0;
            vertical-align: middle;
        }

        .info-tip:hover, .info-tip:focus { 
            background: var(--accent-blue); 
            color: var(--container-bg); 
        }

        .info-tip .tip-box {
            visibility: hidden; 
            width: 240px; 
            max-width: calc(100vw - 32px); /* Keeps box within screen margins on mobile */
            background-color: #1e293b;
            color: var(--text); 
            text-align: left; 
            border: 1px solid var(--accent-blue);
            border-radius: 8px; 
            padding: 12px; 
            position: absolute; 
            z-index: 10000;
            bottom: 145%; 
            left: 50%; 
            transform: translateX(-50%); 
            opacity: 0;
            transition: opacity 0.2s, visibility 0.2s; 
            font-weight: normal;
            font-size: 0.85rem; 
            line-height: 1.4; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            pointer-events: none;
            overflow: auto;
        }

        .info-tip .tip-box::after {
            content: ""; 
            position: absolute; 
            top: 100%; 
            left: 50%;
            margin-left: -6px; 
            border-width: 6px; 
            border-style: solid;
            border-color: var(--accent-blue) transparent transparent transparent;
        }

        .info-tip:hover .tip-box, .info-tip:focus .tip-box { 
            visibility: visible; 
            opacity: 1; 
        }

        .footer-disclaimer {
            font-size: 0.75rem; 
            color: #f43f5e;
            display: block; 
            text-align: center;
            margin-top: 15px;
            opacity: 0.8;
        }

        /* --- Dynamic Document Mapping Themes --- */
        .theme-coordinator {
            color: #4ade80 !important; 
            border-left: 4px solid #4ade80;
        }
        .theme-transport {
            color: #38bdf8 !important; 
            border-left: 4px solid #38bdf8;
        }
        .theme-health {
            color: #f43f5e !important; 
            border-left: 4px solid #f43f5e;
        }
        .theme-rental {
            color: #fb923c !important; 
            border-left: 4px solid #fb923c;
        }
        .theme-qr-code {
            color: #ffffff !important; 
            border-left: 4px solid #ffffff;
        }

        /* --- Global Expand/Collapse Controls --- */
        .global-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .control-btn {
            flex: 1;
            background: var(--panel-bg);
            border: 1px solid #334155;
            color: var(--text);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease;
            text-align: center;
        }

        .control-btn:hover {
            background: #25334d;
            border-color: var(--accent-blue);
        }

    </style>
</head>
<body>

<div class="container">
    <main>
        <h3 class="main-title" data-i18n="main-title">Neurodivergent Employment Resource</h3>
        <span class="subtitle" data-i18n="subtitle">Checklist for finding and sustaining employment for neurodivergent youth</span>

        <div class="global-controls">
            <button class="control-btn" id="btn-open-all">Open All</button>
            <button class="control-btn" id="btn-close-all">Close All</button>
        </div>

        <div id="dynamic-resource-container">Compiling database...</div>
    </main>

    <div>
        <details class="resource-group">
            <summary class="resource-header theme-qr-code">QR Code</summary>
            <div class="dropdown-content">
                <img id="secret-trigger5" src="images/qr-code.png" style="width: 100%; max-width: 300px; display: block; margin: 10px auto;">
            </div>
        </details>
    </div>

    <span class="footer-disclaimer">Disclaimer: All compiled resources are provided as is and compiled from many sources. Use at your own discretion.</span>
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
    // 1. Structural File Assignment Matrix
    const dataFiles = [
        { path: 'data/questionaire.txt', colorClass: 'theme-qr-code' },
        { path: 'data/prepping.txt', colorClass: 'theme-rental' },
        { path: 'data/labour-market.txt', colorClass: 'theme-transport' },
        { path: 'data/finding-employers.txt', colorClass: 'theme-health' },
        { path: 'data/sustain.txt', colorClass: 'theme-coordinator' },
        { path: 'data/find-help.txt', colorClass: 'theme-rental' }
    ];

    let combinedHTML = "";

    // 2. Sequential Document Compilation Stream
    for (const file of dataFiles) {
        try {
            const response = await fetch(file.path);
            if (!response.ok) {
                console.warn(`Asset trace skipped: ${file.path} (Response State: ${response.status})`);
                continue;
            }
            const rawTextData = await response.text();

            // Build segment modules and combine them into global buffer
            combinedHTML += convertTextToHTML(rawTextData, file.colorClass);
        } catch (err) {
            console.error(`Fatal connection interface error compiling structural file target ${file.path}:`, err);
        }
    }

    // 3. Inject compiled DOM tree to interface view structure
    const container = document.getElementById('dynamic-resource-container');
    container.innerHTML = combinedHTML || "<p style='text-align:center; color:var(--text-muted);'>No clean assets initialized inside workspace.</p>";

    // 4. Secure click boundary interception & auto-repositioning for popup tips
    function keepTipInBounds(tip) {
        const tipBox = tip.querySelector('.tip-box');
        if (!tipBox) return;

        // Reset positioning to measure natural center
        tipBox.style.left = '50%';
        tipBox.style.right = 'auto';
        tipBox.style.transform = 'translateX(-50%)';

        const rect = tipBox.getBoundingClientRect();
        const padding = 16; // Margin from screen edge

        // If overflowing right edge, align right edge of tipbox to the icon
        if (rect.right > window.innerWidth - padding) {
            tipBox.style.left = 'auto';
            tipBox.style.right = '0';
            tipBox.style.transform = 'none';
        } 
        // If overflowing left edge, align left edge of tipbox to the icon
        else if (rect.left < padding) {
            tipBox.style.left = '0';
            tipBox.style.right = 'auto';
            tipBox.style.transform = 'none';
        }
    }

    container.querySelectorAll('.info-tip').forEach(tip => {
        tip.addEventListener('mouseenter', () => keepTipInBounds(tip));
        tip.addEventListener('focus', () => keepTipInBounds(tip));
        tip.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation(); // Prevents bubbling to <a> tags and executing link route logic
        });
    });
});

// Structural Compilation Core Parsing Engine
function convertTextToHTML(text, colorClass) {
    // Read individual row matrices, strip formatting deadspaces, drop blank lines
    const lines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);

    let htmlOutput = "";
    let insideGroup = false;
    const isUrl = (str) => str.startsWith('http://') || str.startsWith('https://');

    let i = 0;
    while (i < lines.length) {

        // Target Mode Alpha: Detect and build Category Group Headers
        if (i + 2 < lines.length && !isUrl(lines[i]) && !isUrl(lines[i+1]) && isUrl(lines[i+2]) && !lines[i].startsWith('*')) {
            if (insideGroup) {
                htmlOutput += `</div></details>\n`;
            }
            htmlOutput += `<details class="resource-group" open>\n`;
            htmlOutput += `  <summary class="resource-header ${colorClass}">${lines[i]}</summary>\n`;
            htmlOutput += `  <div class="dropdown-content">\n`;
            insideGroup = true;
            i++; 
            continue;
        }

        // Target Mode Beta: Identify Link Nodes, Extract Short-Texts & Nest Tooltip Strings
        if (i + 1 < lines.length && isUrl(lines[i+1])) {
            let title = lines[i].replace(/\[\[|\]\]/g, ''); // Removes double-bracket notation arrays gracefully
            let url = lines[i+1];
            let shortDesc = "";
            let tipBoxText = "";

            i += 2; // Forward tracking step pointer beyond processed Title and URL strings

            // Lookahead pattern match execution for Short Description properties
            if (i < lines.length && !isUrl(lines[i]) && !lines[i].startsWith('*')) {
                if (i + 1 < lines.length && isUrl(lines[i+1])) {
                    // Next row configuration belongs to an independent sequential element node block
                } else {
                    shortDesc = lines[i];
                    i++;
                }
            }

            // Lookahead pattern match execution for Asterisk Popup Text items
            if (i < lines.length && lines[i].startsWith('*')) {
                tipBoxText = lines[i].replace(/\*/g, '').trim();
                i++;
            }

            // Build structural output string segments
            htmlOutput += `    <a href="${url}" target="_blank" class="sub-link">\n`;
            htmlOutput += `        <strong>${title}</strong>\n`;

            if (tipBoxText) {
                htmlOutput += `        <span class="info-tip" tabindex="0">?`;
                htmlOutput += `            <div class="tip-box">${tipBoxText}</div>`;
                htmlOutput += `        </span>\n`;
            }

            if (shortDesc) {
                htmlOutput += `        <br><span class="link-text">${shortDesc}</span>\n`;
            }

            htmlOutput += `    </a>\n`;
            continue;
        }

        i++; // Absolute index step advance safeguard
    }

    if (insideGroup) {
        htmlOutput += `</div></details>\n`;
    }

    return htmlOutput;
}
</script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    // Select the buttons
    const btnOpenAll = document.getElementById('btn-open-all');
    const btnCloseAll = document.getElementById('btn-close-all');

    // Add event listener to open all <details> elements
    if (btnOpenAll) {
        btnOpenAll.addEventListener('click', () => {
            const allDetails = document.querySelectorAll('details.resource-group');
            allDetails.forEach(details => {
                details.open = true;
            });
        });
    }

    // Add event listener to close all <details> elements
    if (btnCloseAll) {
        btnCloseAll.addEventListener('click', () => {
            const allDetails = document.querySelectorAll('details.resource-group');
            allDetails.forEach(details => {
                details.open = false;
            });
        });
    }
});
</script>

    <script>
(function() {
    let clickCount = 0;
    let clickTimer;
    // Updated ID reference
    const trigger = document.getElementById('secret-trigger5');

    if (trigger) {
        trigger.addEventListener('click', () => {
            clickCount++;
            clearTimeout(clickTimer);
            clickTimer = setTimeout(() => { clickCount = 0; }, 800); 

            if (clickCount === 3) {
                clickCount = 0;
                launchNeonSnake();
            }
        });
    }

    function launchNeonSnake() {
        const overlay = document.getElementById('gameOverlay');
        const frame = document.getElementById('gameFrame');
        
        const snakeGameSource = `
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --neon-green: #00ff88; --neon-pink: #ff0055; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { width: 100%; height: 100vh; background: #000; overflow: hidden; display: flex; flex-direction: column; font-family: monospace; }
        #game-container { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #score-display { position: absolute; top: 10px; left: 10px; font-size: 20px; z-index: 10; }
        canvas { border: 1px solid #222; max-width: 95vw; max-height: 50vh; background: #000; }
        .controls { height: 40vh; display: grid; grid-template-areas: ". up ." "left . right" ". down ."; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; gap: 10px; padding: 20px; background: #080808; }
        .btn { background: #111; border: 1px solid #333; border-radius: 15px; color: var(--neon-green); font-size: 30px; display: flex; align-items: center; justify-content: center; }
        .btn:active { background: var(--neon-green); color: #000; }
        #up { grid-area: up; } #down { grid-area: down; } #left { grid-area: left; } #right { grid-area: right; }
        .gay-rainbow {
            background: linear-gradient(to right, #F94D4D, #F9B04D, #F9F94D, #4DF94D, #4D97F9, #B04DF9, #F94DF9);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            background-size: 200% auto; animation: rainbow 3s linear infinite;
        }
        @keyframes rainbow { 0% { background-position: 0 0; } 100% { background-position: 200% center; } }
    </style>
</head>
<body>
    <div id="score-display" class="gay-rainbow">SCORE: <span id="s-val">00</span></div>
    <div id="game-container"><canvas id="snakeGame" width="400" height="400"></canvas></div>
    <div class="controls">
        <div id="up" class="btn">▲</div><div id="left" class="btn">◀</div>
        <div id="right" class="btn">▶</div><div id="down" class="btn">▼</div>
    </div>
    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const sVal = document.getElementById("s-val");
        const gridSize = 20, tileCount = 20;
        let snake, food, dx, dy, score, gameActive;

        function init() {
            snake = [{x: 10, y: 10}]; food = {x: 5, y: 5};
            dx = 0; dy = 0; score = 0; gameActive = true;
            sVal.innerText = "00";
        }

        function gameLoop() {
            if (!gameActive) return;
            update(); draw();
            setTimeout(gameLoop, 115);
        }

        function update() {
            if (dx === 0 && dy === 0) return;
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            if (head.x < 0) head.x = tileCount-1; if (head.x >= tileCount) head.x = 0;
            if (head.y < 0) head.y = tileCount-1; if (head.y >= tileCount) head.y = 0;
            if (snake.some(p => p.x === head.x && p.y === head.y)) {
                gameActive = false;
                alert("CRITICAL FAILURE. SCORE: " + score);
                init();
                gameLoop();
                return;
            }
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score++; sVal.innerText = score.toString().padStart(2, '0');
                food = {x: Math.floor(Math.random()*tileCount), y: Math.floor(Math.random()*tileCount)};
            } else { snake.pop(); }
        }

        function draw() {
            ctx.fillStyle = "#000"; ctx.fillRect(0,0,400,400);
            ctx.fillStyle = "#ff0055"; ctx.beginPath();
            ctx.arc(food.x*20+10, food.y*20+10, 7, 0, Math.PI*2); ctx.fill();
            snake.forEach((p, i) => {
                ctx.fillStyle = i === 0 ? "#fff" : "#00ff88";
                ctx.fillRect(p.x*20+1, p.y*20+1, 18, 18);
            });
        }

        function setDir(x, y) { if ((x===-dx && dx!==0)||(y===-dy && dy!==0)) return; dx=x; dy=y; }
        document.getElementById('up').onpointerdown = (e) => { e.preventDefault(); setDir(0,-1); };
        document.getElementById('down').onpointerdown = (e) => { e.preventDefault(); setDir(0,1); };
        document.getElementById('left').onpointerdown = (e) => { e.preventDefault(); setDir(-1,0); };
        document.getElementById('right').onpointerdown = (e) => { e.preventDefault(); setDir(1,0); };

        init(); gameLoop();
    <\/script>
</body>
</html>`;

        const blob = new Blob([snakeGameSource], { type: 'text/html' });
        frame.src = URL.createObjectURL(blob);
        overlay.style.display = 'flex';
        document.body.style.overflow = 'hidden'; 
    }

    window.closeGame = function() {
        const overlay = document.getElementById('gameOverlay');
        const frame = document.getElementById('gameFrame');
        overlay.style.display = 'none';
        frame.src = "about:blank"; 
        document.body.style.overflow = 'auto'; 
    };
})();
</script>
